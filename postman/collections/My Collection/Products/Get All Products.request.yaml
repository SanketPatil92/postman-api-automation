$kind: http-request
url: "{{BaseUrl}}/products"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      let responseJson = pm.response.json();\r

      pm.environment.set(\"product_id\", responseJson.products[0].id);\r\n"
    language: text/javascript
order: 1000

$kind: http-request
url: "{{BaseUrl}}/products/{{invalid_id}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 404", function () {
          pm.response.to.have.status(404);
      });

      let responseJson = pm.response.json();

      pm.test("Response message indicates product not found", function () {
          pm.expect(responseJson.message).to.be.a("string").and.not.empty;
          pm.expect(responseJson.message).to.include("not found");
      });
    language: text/javascript
order: 1783655560990
